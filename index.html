<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        h1 { margin-bottom: 8px; }
        p.subtitle { color: #666; margin-bottom: 32px; }
        ul { list-style: none; }
        li { margin-bottom: 12px; }
        a {
            color: #0969da;
            text-decoration: none;
            font-size: 1.1em;
        }
        a:hover { text-decoration: underline; }
        .empty { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <h1>Alex's Games</h1>
    <p class="subtitle">A collection of games by Alex</p>
    <p class="empty">No games yet — check back soon!</p>
    <!-- When adding the first game, replace the .empty paragraph with:
    <ul>
        <li><a href="game-name/">Game Name</a></li>
    </ul>
    -->
</body>
</html>
